      </div>

     
      <div class="product-card">
        <img src="C:\Users\SHANEN JANE\OneDrive\Pictures\jj\photo-1611532736597-de2d4265fba3.jpg" alt="Product 4">

     <h3>Printer</h3>

      <div class="product-card">

     </div>

    </div>
  </div>

  <div class="cart-panel">
    <h2>Cart</h2>

    <div class="cart-items" id="cartItems">
      <p class="empty-msg">Your cart is empty.</p>
    </div>

    <div class="cart-summary">
      <div class="summary-row">
        <span>Subtotal:</span>
        <span id="subtotal">0</span>
      </div>
      <div class="summary-row">
        <span>Tax (12%):</span>
        <span id="taxAmount">0</span>
      </div>
      <div class="summary-row total">
        <span>Total:</span>
        <span id="totalAmount">0</span>
      </div>
    </div>
    <div class="cart-actions">
      <button class="btn-clear" onclick="clearCart()">Clear All</button>
      <button class="btn-checkout" onclick="checkout()">Check Out</button>
    </div>
    <div id="checkoutModal" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle"></h2>
    <p id="modalMessage"></p>
    <button class="modal-btn" onclick="closeModal()">OK</button>
  </div>
</div>
  </div>
</div>
<script src="add-to-cart.js"></script>
